<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="40" fill="#1a2940"/>

  <!-- Chat bubble -->
  <rect x="30" y="30" width="140" height="95" rx="14" fill="#243650"/>
  <polygon points="48,125 48,145 70,125" fill="#243650"/>

  <!-- Graph line inside bubble -->
  <polyline points="48,100 72,72 96,88 120,58 144,74" stroke="#3b7fd4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dots on the line -->
  <circle cx="48" cy="100" r="4" fill="#3b7fd4"/>
  <circle cx="72" cy="72" r="4" fill="#3b7fd4"/>
  <circle cx="96" cy="88" r="4" fill="#3b7fd4"/>
  <circle cx="120" cy="58" r="4" fill="#60a5fa"/>
  <circle cx="144" cy="74" r="4" fill="#3b7fd4"/>

  <!-- Cursor/prompt indicator -->
  <rect x="48" y="110" width="24" height="4" rx="2" fill="#60a5fa" opacity="0.6"/>
  <rect x="78" y="110" width="40" height="4" rx="2" fill="#60a5fa" opacity="0.3"/>

  <!-- Bottom bar (chat input) -->
  <rect x="30" y="158" width="140" height="18" rx="9" fill="#243650"/>
  <circle cx="159" cy="167" r="7" fill="#2563a8"/>
  <path d="M156 167L159 164L162 167" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
