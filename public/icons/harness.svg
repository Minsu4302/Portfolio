<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="40" fill="#1a2940"/>

  <!-- Connection lines -->
  <line x1="100" y1="50" x2="50" y2="110" stroke="#2563a8" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="100" y1="50" x2="150" y2="110" stroke="#2563a8" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="50" y1="110" x2="100" y2="160" stroke="#3b7fd4" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="150" y1="110" x2="100" y2="160" stroke="#3b7fd4" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="50" y1="110" x2="150" y2="110" stroke="#2563a8" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4 3"/>

  <!-- Top node (orchestrator) -->
  <circle cx="100" cy="50" r="18" fill="#2563a8"/>
  <path d="M93 50L98 55L108 45" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left agent node -->
  <circle cx="50" cy="110" r="14" fill="#243650" stroke="#3b7fd4" stroke-width="2"/>
  <rect x="43" y="104" width="14" height="3" rx="1.5" fill="#3b7fd4"/>
  <rect x="43" y="109" width="10" height="3" rx="1.5" fill="#3b7fd4" opacity="0.6"/>
  <rect x="43" y="114" width="12" height="3" rx="1.5" fill="#3b7fd4" opacity="0.4"/>

  <!-- Right agent node -->
  <circle cx="150" cy="110" r="14" fill="#243650" stroke="#60a5fa" stroke-width="2"/>
  <path d="M144 107L148 111L157 103" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom result node -->
  <circle cx="100" cy="160" r="14" fill="#243650" stroke="#2563a8" stroke-width="2"/>
  <path d="M94 160L97 163L106 154" stroke="#2563a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
